unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# 2. Define the first press (Jump to Pane + Switch to 'fastzoom' mode)
bind 1 select-pane -t 1 \; switch-client -T fastzoom
bind 2 select-pane -t 2 \; switch-client -T fastzoom
bind 3 select-pane -t 3 \; switch-client -T fastzoom
bind 4 select-pane -t 4 \; switch-client -T fastzoom
bind 5 select-pane -t 5 \; switch-client -T fastzoom

# 3. Define the second press (Zoom the pane)
# If you press the SAME number again immediately, it zooms.
bind -T fastzoom 1 resize-pane -Z
bind -T fastzoom 2 resize-pane -Z
bind -T fastzoom 3 resize-pane -Z
bind -T fastzoom 4 resize-pane -Z
bind -T fastzoom 5 resize-pane -Z

set -g base-index 1
setw -g pane-base-index 1

set-window-option -g mode-keys vi
bind-key -n C-f copy-mode \; command-prompt -p "(search up)" "send -X search-backward \"%%%\""



set -g mouse on
set-option -g focus-events on

bind-key -n M-S display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

set-option -g detach-on-destroy off

# Splits
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"
bind -n M-x kill-pane

# Navigate panes
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-h select-pane -L  # overrides prev-window; see note below
bind -n M-l select-pane -R  # overrides next-window; see note below

# Resize panes
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-H resize-pane -L 5
bind -n M-L resize-pane -R 5

# Tab-like window management (no prefix needed)
bind -n M-t new-window
bind -n M-w kill-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

#set-option -a terminal-features 'alacritty:RGB'
#set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB:Tc"

# Enable 256-color and true-color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Support undercurls (wavy underlines for Neovim diagnostics)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm' 
set -as terminal-overrides ',*:Setbg=\E[48:2::%p1%d:%p2%d:%p3%dm'

source-file ~/.tmux/theme.tmux

