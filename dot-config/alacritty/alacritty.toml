[general]
live_config_reload = true
import = [
    "~/.config/alacritty/themes/tokyonight_night.toml"
]

# Override colors for better diff readability (Copilot CLI edits)
# Make green darker for better contrast when used as background color
# Copilot CLI uses ANSI colors: green=2/10 for added lines

[window]
dynamic_title = true
padding = {x = 4,y = 2}
dynamic_padding = true

[env]
TERM = "xterm-256color"

[selection]
save_to_clipboard = true

[terminal.shell]
program = "new_main_session"
args = []

[scrolling]
history = 0

[[hints.enabled]]
regex = "(mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\^⟨⟩`\\[\\]]+"
hyperlinks = true
command = { program = "xdg-open", args = ["${text}"]} # Use 'open' on macOS
mouse = { enabled = true, mods = "None" } # 'None' means no modifier needed
binding = { key = "O", mods = "Control|Shift" }

[keyboard]
bindings = [
    { key = ",", mods =  "Alt", action = "ResetFontSize"  },
    { key = "f", mods = "Control|Shift", action = "ReceiveChar" },
]

[window.dimensions]
columns = 120
lines = 50

[cursor]
style = {shape = "Block",blinking = "On"}
unfocused_hollow = true


[font]
size = 12.0

[font.offset]
x = 0
y = 0


[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold Italic"


