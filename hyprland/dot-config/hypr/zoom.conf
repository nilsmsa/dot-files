# 1. Global Baseline: Float all Zoom windows by default (popups, chats, alerts)
windowrule {
    name = zoom-global-float
    match:class = ^(Zoom)$
    float = on
    focus_on_activate = on
    move = cursor -50% -50%
    no_follow_mouse = on
}

# 2. Dashboard Override: Banish the main window to Workspace 10 (Tiled & Silent)
windowrule {
    name = banish-zoom-dashboard
    match:initial_class = ^(Zoom|zoom)$
    match:initial_title = ^(Zoom Workplace.*)$   # Strict matching (removed .*) so it leaves meetings alone
    workspace = 10 silent
    tile = on
    no_initial_focus = on
    focus_on_activate = off
    stay_focused = off
}

# 3. Meeting Override: Force the actual meeting window to tile on your CURRENT workspace
windowrule {
    name = zoom-meeting-tile
    match:class = ^(Zoom)$
    match:title = .*Meeting.*
    tile = on
    workspace = unset                          # Forces the window to ignore Workspace 10 and stay where you are
    focus_on_activate = on                     # Keeps focus on the meeting window when it starts up
    stay_focused = off
}

